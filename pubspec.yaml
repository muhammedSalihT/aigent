name: aigent_softwares
description: "AIgent softwares — AI-First Software Development Company Website"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.7.0

  # Routing
  go_router: ^13.2.0

  # Animation
  flutter_animate: ^4.5.0
  lottie: ^3.1.0

  # Fonts & UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10

  # Responsive
  responsive_framework: ^1.4.0

  # Networking
  dio: ^5.4.3
  cached_network_image: ^3.3.1

  # Forms
  reactive_forms: ^17.0.1

  # Utilities
  visibility_detector: ^0.4.0+2
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
