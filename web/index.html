  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0D0220;
      overflow: hidden;
    }
    #loading-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #0D0220;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    #loading-screen h1 {
      font-family: sans-serif;
      color: #fff;
      font-size: 2rem;
      letter-spacing: 2px;
    }
    #loading-screen h1 span { color: #6B3FA0; }
    #loading-bar {
      width: 200px;
      height: 3px;
      background: #1A0A35;
      border-radius: 2px;
      margin-top: 20px;
      overflow: hidden;
    }
    #loading-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #6B3FA0, #4A90D9);
      width: 0%;
      animation: load 2s ease-in-out forwards;
    }
    @keyframes load {
      to { width: 100%; }
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <h1>Soft<span>AI</span>gent</h1>
    <div id="loading-bar"><div id="loading-bar-fill"></div></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var ls = document.getElementById('loading-screen');
      if (ls) {
        ls.style.opacity = '0';
        ls.style.transition = 'opacity 0.5s ease';
        setTimeout(function() { ls.remove(); }, 500);
      }
    });
  </script>
</body>
